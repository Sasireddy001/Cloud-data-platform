name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

# Note: Uncomment the push block below only after setting AZURE_CREDENTIALS secret.
# on:
#   push:
#     branches:
#       - main
#     paths:
#       - 'terraform/**'
#       - '.github/workflows/terraform-apply.yml'

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Azure credentials secrets
        run: |
          missing=""
          if [ -z "${{ secrets.AZURE_CLIENT_ID }}" ]; then
            missing="AZURE_CLIENT_ID $missing"
          fi
          if [ -z "${{ secrets.AZURE_CLIENT_SECRET }}" ]; then
            missing="AZURE_CLIENT_SECRET $missing"
          fi
          if [ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            missing="AZURE_SUBSCRIPTION_ID $missing"
          fi
          if [ -z "${{ secrets.AZURE_TENANT_ID }}" ]; then
            missing="AZURE_TENANT_ID $missing"
          fi
          if [ -n "$missing" ]; then
            echo "ERROR: The following GitHub secrets are missing: $missing"
            echo "Go to Settings -> Secrets and variables -> Actions and add them."
            echo "Or create a service principal with:"
            echo "az ad sp create-for-rbac --name \"cloud-data-platform-sp\" --role Contributor --scopes /subscriptions/<subscription-id>"
            echo "Then add AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_SUBSCRIPTION_ID, AZURE_TENANT_ID."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure Azure credentials
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -input=false

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve -input=false -var-file=environments/${{ github.event.inputs.environment || 'dev' }}/terraform.tfvars

      - name: Terraform Output
        run: |
          cd terraform
          terraform output -json > outputs.json

      - name: Upload Terraform Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: terraform/outputs.json
