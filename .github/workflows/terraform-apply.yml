name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

# Note: Uncomment the push block below only after setting AZURE_CREDENTIALS secret.
# on:
#   push:
#     branches:
#       - main
#     paths:
#       - 'terraform/**'
#       - '.github/workflows/terraform-apply.yml'

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Azure credentials secret
        run: |
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "ERROR: AZURE_CREDENTIALS secret is not configured."
            echo "Go to Settings -> Secrets and variables -> Actions and add AZURE_CREDENTIALS."
            echo "See README.md for setup instructions."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Configure Azure credentials
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -input=false

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve -input=false -var-file=environments/${{ github.event.inputs.environment || 'dev' }}/terraform.tfvars

      - name: Terraform Output
        run: |
          cd terraform
          terraform output -json > outputs.json

      - name: Upload Terraform Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: terraform/outputs.json
